name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ccodebox-linux-amd64
          # TODO: re-enable after fixing cross-compilation for linux-arm64
          # - target: aarch64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   artifact: ccodebox-linux-arm64
          #   use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ccodebox-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ccodebox-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # 1. Build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 2. Build backend (rust-embed embeds frontend/out/)
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build backend (cross)
        if: matrix.use-cross
        working-directory: backend
        run: cross build --release --target ${{ matrix.target }}

      - name: Build backend (native)
        if: ${{ !matrix.use-cross }}
        working-directory: backend
        run: cargo build --release --target ${{ matrix.target }}

      # 3. Package
      - name: Package
        run: |
          mkdir -p dist
          cp backend/target/${{ matrix.target }}/release/ccodebox dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    if: always() && contains(needs.build.result, 'success') || needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
